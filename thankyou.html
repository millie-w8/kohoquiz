<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mystery Journey — ありがとうございました</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="completion-wrapper">

    <p class="completion-subtitle">ミステリージャーニー 完</p>
    <h1 class="completion-title" style="margin-bottom: 24px;">ありがとう<br>ございました</h1>

    <div class="final-answer-box" style="max-width: var(--max-width); width: 100%; margin-bottom: 28px;">
      <div class="final-answer-label">参加記念</div>
      <p style=" font-family: 'Crimson Text', serif; font-size: 1rem; color: var(--text-main);
        line-height: 1.95; font-style: italic; text-align: center; ">
        全18問を制覇し、<br>
        暁秀祭のスローガンを解き明かしてくれた君へ。<br><br>
        この冒険に参加してくれて、<br>
        本当にありがとうございました。
      </p>
    </div>

    <p style="
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.9;
    ">
      広報委員会
    </p>

  </div>

  <script src="db.js"></script>
  <script>
    // Mark the player as having seen the thank-you screen.
    // This flag is what blocks re-entry to completion.html.
    const state = QuizDB.getPlayerState();
    state.thanked = true;
    QuizDB.savePlayerState(state);

    // Block all back navigation from this screen.
    history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', () => {
      history.pushState(null, '', window.location.href);
    });
  </script>
</body>
</html>
