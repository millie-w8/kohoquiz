<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mystery Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

  <!-- ── Page layout ─────────────────────────────────────── -->
  <div class="page-wrapper">
    <div class="container">

      <!-- Header -->
      <div class="app-header">
        <span class="app-logo">ミステリージャーニー</span>
        <span class="question-counter" id="progress-label">0 / 18</span>
      </div>

      <!-- Progress bar -->
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
      </div>

      <h1 class="entry-title" style="margin-bottom:4px;">Mystery Journey</h1>
      <p class="entry-sub">文化祭 2026</p>

      <!-- ── Scanner section ─────────────────────────── -->
      <div id="scanner-section">

        <!-- Camera view — FIX 4: close button inside scanner UI -->
        <div id="scanner-open-wrap">
          <div class="scanner-wrapper" id="scanner-wrapper">
            <video id="qr-video" playsinline muted autoplay></video>
            <canvas id="qr-canvas" style="display:none;"></canvas>
            <div class="scanner-corners">
              <span class="scanner-corner-extra"></span>
              <div class="scanner-sweep" id="scanner-sweep"></div>
            </div>
            <!-- FIX 4: Close scanner button overlaid on camera -->
            <button id="close-scanner-btn" onclick="closeScanner()" aria-label="Close scanner" style="
              position: absolute; top: 10px; right: 10px; z-index: 10;
              background: rgba(20,12,4,0.72); border: 1px solid var(--border-mid);
              border-radius: 50%; width: 36px; height: 36px; color: var(--gold-mid);
              font-size: 1.1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
              touch-action: manipulation;
            ">✕</button>
          </div>

          <p class="scanner-status" id="scanner-status">QRコードを読み込んで！</p>
        </div>

        <!-- Open scanner button — shown when camera is closed -->
        <div id="scanner-closed-wrap" style="display:none; text-align:center; margin-bottom:14px;">
          <button class="btn-primary" onclick="openScanner()" style="max-width:280px;">
            📷 &nbsp;スキャナーを開く
          </button>
        </div>
      </div>
      
      <!-- ── Info buttons ──────────────────────────────── -->
      <div class="info-btn-row">

        <button class="info-btn" onclick="showInfo('rules')">
          <span class="info-btn-icon">📜</span>
          <span class="info-btn-label">ルール説明</span>
        </button>

        <button class="info-btn" onclick="showInfo('cautions')">
          <span class="info-btn-icon">⚠</span>
          <span class="info-btn-label">注意事項</span>
        </button>

        <button class="info-btn" onclick="showInfo('hints')">
          <span class="info-btn-icon">💡</span>
          <span class="info-btn-label">ヒント</span>
        </button>

      </div>

      <!-- Info modal -->
      <div class="info-modal-overlay" id="info-modal" onclick="closeInfo()">
        <div class="info-modal-card" onclick="event.stopPropagation()">
          <button class="info-modal-close" onclick="closeInfo()">✕</button>
          <div class="info-modal-title" id="info-title"></div>
          <div class="info-modal-body" id="info-body"></div>
        </div>
      </div>
      
      <!-- /scanner-section -->

      <div class="spacer"></div>

      <!-- FIX 2: Scroll of Letters lives on index.html -->
      <div class="keyword-box" id="keyword-box">
        <div class="keyword-box-title">― キーワード ―</div>
        <div id="letters-container"></div>
      </div>

      <div class="spacer"></div>

    </div>
  </div>

  <!-- ────────────────────────────────────────────────────── -->
  <script src="db.js"></script>
  <script>
    // ── Question letter map (shopId → letter) ──────────────
    // FIX 3: order of visits doesn't matter — we look up by shopId
    const SHOP_LETTER = {
      1:'あ', 2:'か', 3:'つ', 4:'き', 5:'に', 6:'さ', 7:'け',
      8:'わ', 9:'れ', 10:'ら', 11:'の', 12:'は', 13:'ま', 14:'ゆ',
      15:'う', 16:'5', 17:'1', 18:'7'
    };

    // Row layout spec
    const LETTER_ROWS = [
      { shopIds: [16, 17, 18], separatorAfter: 16, separator: '／' },
      { shopIds: [1, 2, 3, 4, 5, 6, 7],            trailingChar: '、' },
      { shopIds: [8, 9, 10, 11, 12, 13, 14, 15] },
    ];

    // ── State ─────────────────────────────────────────────
    let scanning    = false;
    let lastScan    = 0;
    const COOLDOWN  = 2000;
    let cameraStream = null;

    const videoEl    = document.getElementById('qr-video');
    const canvasEl   = document.getElementById('qr-canvas');
    const statusEl   = document.getElementById('scanner-status');
    const ctx        = canvasEl.getContext('2d');

    // ── On load ────────────────────────────────────────────
    const state = QuizDB.getPlayerState();

    if (state.completed) {
      window.location.replace('completion.html');
    }

    // Update progress header
    updateProgress();

    // Render the scroll of letters (random order supported)
    renderKeywordBox();

    // ── Info modal content — EDIT TEXT HERE ───────────────
    const INFO_CONTENT = {
      rules: {
        title: '📜 ルール説明',
        body: `
          ※不具合が発生したり、わからないことがある場合は、1階110・111番教室「Area3Z」の生徒にお声がけください。<br>
          または、081091@gyoshu.ed.jpまでお問い合わせください。<br>
          <br>
          1. 校内を歩き回り、QRコード付きのポスターを探そう！<br>
          2. ポスターを見つけたら、ホーム画面のカメラを使ってQRコードを読み取ろう！<br>
          3.四択クイズに挑戦！正解だと思う選択肢を1つ選び、「決定」ボタンを押そう！<br>
          ・正解すると、キーワードが1文字表示されます。<br>
          　　数秒後にホーム画面へ戻るので、次のQRコードを探してください。<br>
          ・不正解の場合は、数秒後にホーム画面へ戻ります。<br>
          　　再度QRコードを読み取り、正解するまで挑戦しよう！<br>
          4. すべてのクイズに正解すると、コンプリート画面が表示されます！<br>
          5. 景品は、<br>
          　3α「謎解きはタイムスリップのあとで」（2階 特別教室1・2）<br>
          　または<br>
          　3Z「Area3Z」（1階 110・111番教室）<br>
          　の無料チケットです！<br>
          <br>
          制限時間は模擬店が閉まる14:00まで！<br>
          全問正解を目指して、文化祭を楽しんでください！
        `
      },
      cautions: {
        title: '⚠ 注意事項',
          body: `
          ・ カメラが起動しない場合は、端末の設定でカメラへのアクセスを許可しているかご確認ください。<br>
          ・ 問題ポスターはすべて同じデザインです。<br>
          ・ 校内では走らないでください。<br>
          ・ 発生したデータ通信費について、本校は一切の責任を負いかねます。あらかじめご了承ください。<br>
          ・ 他の参加者や来場者の迷惑にならないよう、ご協力をお願いいたします。<br>
          ・ ポスターや掲示物には触れたり、はがしたりしないでください。<br>
          ・ 景品の交換は、コンプリート画面を該当模擬店の受付に提示してください。<br>
          （該当模擬店は📜 ルール説明をチェックしてください）
        `
      },
      hints: {
        title: '💡 ヒント',
        body: `
          QRコード付きのポスターは、クラス企画の模擬店周辺や学年展示の近くに貼ってあるよ！<br>
          イートインスペース、部活動の企画、体育館などのエリアには貼ってないので注意してね！
        `
      }
    };

    function showInfo(key) {
      const content = INFO_CONTENT[key];
      document.getElementById('info-title').textContent = content.title;
      document.getElementById('info-body').innerHTML    = content.body;
      const modal = document.getElementById('info-modal');
      modal.style.display = 'flex';
    }

    function closeInfo() {
      document.getElementById('info-modal').style.display = 'none';
    }

    // Auto-open camera on load
    openScanner();

    // ── Progress display ───────────────────────────────────
    function updateProgress() {
      const n = state.completedShops.length;
      document.getElementById('progress-label').textContent = `${n} / 18`;
      document.getElementById('progress-fill').style.width  = (n / 18 * 100) + '%';
    }

    // ── Keyword box ─────────────────────────────────────────
    // FIX 3: revealed state is looked up by shopId index, not by visit order
    function renderKeywordBox() {
      const container = document.getElementById('letters-container');
      container.innerHTML = '';

      LETTER_ROWS.forEach(rowDef => {
        const rowEl = document.createElement('div');
        rowEl.className = 'letter-row';

        rowDef.shopIds.forEach(shopId => {
          // revealedLetters[shopId - 1] is set when that shop is completed
          const isRevealed = state.revealedLetters[shopId - 1] !== null;

          const tile = document.createElement('div');
          tile.className = isRevealed ? 'letter-tile unlocked' : 'letter-tile locked';
          if (isRevealed) tile.textContent = SHOP_LETTER[shopId];
          tile.title = `Shop ${shopId}`;
          rowEl.appendChild(tile);

          if (rowDef.separatorAfter && shopId === rowDef.separatorAfter) {
            const sep = document.createElement('span');
            sep.className = 'row-separator';
            sep.textContent = rowDef.separator;
            rowEl.appendChild(sep);
          }
        });

        if (rowDef.trailingChar) {
          const trail = document.createElement('span');
          trail.className = 'row-trailing';
          trail.textContent = rowDef.trailingChar;
          rowEl.appendChild(trail);
        }

        container.appendChild(rowEl);
      });
    }

    // ── Camera open / close ────────────────────────────────

    async function openScanner() {
      document.getElementById('scanner-open-wrap').style.display = 'block';
      document.getElementById('scanner-closed-wrap').style.display = 'none';
      scanning = true;

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 640 },
            height: { ideal: 640 }
          }
        });
        videoEl.srcObject = cameraStream;
        videoEl.play();
        requestAnimationFrame(tick);
        statusEl.textContent = 'QRコードを読み込んで！';
      } catch (err) {
        statusEl.textContent = 'Camera unavailable — use manual entry below.';
        document.getElementById('scanner-sweep').style.display = 'none';
        console.warn('Camera error:', err);
      }
    }

    // FIX 4: close scanner, stop camera, show "Open Scanner" button
    function closeScanner() {
      scanning = false;
      stopCamera();
      document.getElementById('scanner-open-wrap').style.display = 'none';
      document.getElementById('scanner-closed-wrap').style.display = 'block';
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      videoEl.srcObject = null;
    }

    // ── Decode loop ────────────────────────────────────────
    function tick() {
      if (!scanning) return;

      if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
        const w = videoEl.videoWidth;
        const h = videoEl.videoHeight;
        if (w === 0 || h === 0) { requestAnimationFrame(tick); return; }

        canvasEl.width  = w;
        canvasEl.height = h;
        ctx.drawImage(videoEl, 0, 0, w, h);

        const imageData = ctx.getImageData(0, 0, w, h);
        const code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });

        if (code && Date.now() - lastScan > COOLDOWN) {
          lastScan = Date.now();
          handleQRResult(code.data);
        }
      }
      requestAnimationFrame(tick);
    }

    // ── Handle scanned result ──────────────────────────────
    function handleQRResult(data) {
      let shopId = null;

      try {
        const url = new URL(data);
        shopId = parseInt(url.searchParams.get('shop'), 10);
      } catch {
        const n = parseInt(data, 10);
        if (n >= 1 && n <= 18) shopId = n;
      }

      if (!shopId || shopId < 1 || shopId > 18) {
        statusEl.textContent = 'QRコードが読み取れません。不具合がある場合、📜 ルール説明の指示に従ってください。';
        return;
      }

      scanning = false;
      statusEl.textContent = `Shop ${shopId} detected — opening quest…`;
      stopCamera();

      setTimeout(() => {
        window.location.href = `quiz.html?shop=${shopId}`;
      }, 500);
    }
  </script>
</body>
</html>
